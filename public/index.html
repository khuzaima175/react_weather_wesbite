<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Link to a favicon if you have one -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Responsive design meta tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title of your web page -->
    <title>Stylish Weather App</title>
  </head>
  <body>
    <!-- This div is where your React application will be mounted -->
    <div id="root"></div>

    <!--
      This script tag is crucial.
      - type="module" enables modern JavaScript module loading.
      - src="/src/main.jsx" points Vite to your main application entry point.
        (Make SURE 'main.jsx' is the correct filename in your 'src' folder.
         If you used TypeScript, it might be 'main.tsx').
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
